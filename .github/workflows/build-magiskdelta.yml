name: Build Magisk Delta

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'app/**'
      - 'native/**'
      - 'stub/**'
      - 'buildSrc/**'
      - 'tools/**'
      - 'build.py'
      - 'build.gradle.kts'
      - 'gradle.properties'
      - '.gitmodules'
      - '.github/workflows/build.yml'
  pull_request:

permissions:
  contents: read

concurrency:
  group: magiskdelta-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout source and submodules
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Verify submodules
        shell: bash
        run: |
          set -Eeuo pipefail
          git submodule status --recursive

          expected=16
          count="$(git ls-files -s | awk '$1 == "160000" { n++ } END { print n+0 }')"
          if [[ "$count" -ne "$expected" ]]; then
            echo "::error::Expected $expected gitlinks, found $count. Run the Repair missing submodules workflow first."
            exit 1
          fi

          while read -r _ path; do
            if [[ ! -e "$path/.git" ]]; then
              echo "::error file=.gitmodules::Submodule was not checked out: $path"
              exit 1
            fi
          done < <(git config -f .gitmodules --get-regexp '^submodule\..*\.path$')

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: >-
            platform-tools
            platforms;android-33
            build-tools;33.0.1

      - name: Verify Android SDK
        shell: bash
        run: |
          set -Eeuo pipefail
          command -v sdkmanager
          sdkmanager --version
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          test -d "$ANDROID_SDK_ROOT/platforms/android-33"
          test -d "$ANDROID_SDK_ROOT/build-tools/33.0.1"

      - name: Install host build tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends ccache ninja-build

      - name: Prepare build scripts
        shell: bash
        run: chmod +x build.py gradlew

      - name: Download Magisk ONDK r25.2
        shell: bash
        run: python build.py -v ndk

      - name: Pin legacy cxxbridge dependencies
        shell: bash
        run: |
          set -Eeuo pipefail

          cxx_dir="native/src/external/cxx-rs"
          historical_lock="$cxx_dir/third-party/Cargo.lock"
          workspace_lock="$cxx_dir/Cargo.lock"

          test -f "$historical_lock"
          cp "$historical_lock" "$workspace_lock"

          python - <<'PY'
          from pathlib import Path

          path = Path("build.py")
          text = path.read_text(encoding="utf-8")

          old = "cmds = [cargo, 'install', '--root', local_cargo_root, '--path', cxx_src]"
          new = "cmds = [cargo, 'install', '--locked', '--root', local_cargo_root, '--path', cxx_src]"

          if new in text:
              print("build.py is already patched")
          elif old in text:
              path.write_text(text.replace(old, new, 1), encoding="utf-8")
              print("Patched cargo install to use --locked")
          else:
              raise SystemExit("Could not find the cxxbridge cargo-install command in build.py")
          PY

          grep -n "cargo, 'install'.*--locked" build.py
          grep -A4 -B2 'name = "quote"' "$workspace_lock" | head -20

      - name: Build release
        shell: bash
        run: python build.py -vr all

      - name: Build debug
        shell: bash
        run: python build.py -v all

      - name: List generated files
        shell: bash
        run: find out -maxdepth 2 -type f -printf '%p  %s bytes\n' | sort

      - name: Upload APKs
        uses: actions/upload-artifact@v7
        with:
          name: magiskdelta-${{ github.sha }}
          path: out/
          if-no-files-found: error
          compression-level: 9
