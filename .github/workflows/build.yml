name: Build Magisk Delta

on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: magiskdelta-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout source and submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Verify required submodules
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          while read -r _ path; do
            if [[ ! -e "$path/.git" ]]; then
              echo "::error file=.gitmodules::Missing submodule: $path"
              missing=1
            fi
          done < <(git config -f .gitmodules --get-regexp '^submodule\..*\.path$')

          if [[ "$missing" -ne 0 ]]; then
            echo "This repository was probably created from a source ZIP."
            echo "A ZIP does not preserve the pinned Git submodule entries."
            exit 1
          fi

          git submodule status --recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Install Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.1"

      - name: Prepare build scripts
        run: chmod +x build.py gradlew

      - name: Download and install Magisk ONDK
        run: python build.py -v ndk

      - name: Build release APK
        run: python build.py -vr all

      - name: Build debug APK
        run: python build.py -v all

      - name: Show outputs
        run: find out -maxdepth 1 -type f -printf '%f  %s bytes\n' | sort

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: magiskdelta-${{ github.sha }}
          path: out/
          if-no-files-found: error
          compression-level: 9
